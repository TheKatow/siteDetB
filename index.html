<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donjons &amp; Bastons — Jeu de société</title>
    <meta name="description" content="Un jeu de société inspiré du jeu de rôle. Rejoignez l'aventure, seul ou en équipe : lancez les dés, combattez les monstres et tentez votre chance face aux dangers du Donjon !">
    <meta name="keywords" content="donjons et bastons, jeu de société, jeu de rôle, donjon, baston, société, dès, monstres">
    <meta property="og:title" content="Donjons &amp; Bastons">
    <meta property="og:description" content="Un jeu de société inspiré du jeu de rôle. Lancez les dés, combattez les monstres et tentez votre chance face aux dangers du Donjon !">
    <meta property="og:image" content="https://donjonsetbastons.fr/PP_insta.png">
    <meta property="og:url" content="https://donjonsetbastons.fr">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://donjonsetbastons.fr">
    <link rel="icon" type="image/png" href="PP_insta2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Metamorphous&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      overflow: clip;
    }

    body {
      height: 100%;
      overflow: hidden;
      background-color: #0d0707;
      background-image: radial-gradient(circle, #3a1313 0%, #0d0707 100%);
      color: #f5efe6;
      font-family: 'Open Sans', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    #embers-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      width: 100%;
      height: 100%;
    }

    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: clamp(6px, 1.2vh, 14px);
      width: 100%;
      max-width: 700px;
      max-height: 100%;
      height: min(95vh, 750px);
      padding: clamp(6px, 1vh, 14px);
      overflow: visible;
      justify-items: center;
      align-items: center;
    }

    .card {
      position: relative;
      perspective: 1000px;
      cursor: pointer;
      width: 100%;
      height: 100%;
      max-width: 200px;
      max-height: 340px;
      -webkit-tap-highlight-color: transparent;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s ease;
      transform-style: preserve-3d;
      transform: rotateY(180deg);
      border: 2px solid #b8860b;
      border-radius: 14px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
    }

    .card.flipped .card-inner {
      transform: rotateY(0deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 12px;
    }

    .card-back {
      transform: rotateY(180deg);
      background: #0d0707;
      border-radius: 12px;
    }

    .card-back::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("card-back.png") center center / cover no-repeat;
      opacity: 1;
      border-radius: 12px;
    }

    .card-front {
      background: #0d0707;
      border-radius: 12px;
      overflow: hidden;
    }

    .card-front::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("fond_site.jpg") top center / cover no-repeat;
      opacity: 1;
      z-index: 0;
      border-radius: 12px;
    }

    .card-front > * {
      position: relative;
      z-index: 1;
    }

    .center-content {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vh, 40px) clamp(16px, 3vw, 30px);
      height: 100%;
      width: 100%;
    }

    .card.flipped .center-content {
      display: flex;
    }

    .outer-content {
      display: none;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .card:not(.center-card).flipped .outer-content {
      display: flex;
    }

    .center-card {
      position: relative;
      z-index: 1;
    }

    .center-card.expanding {
      position: absolute;
      z-index: 999;
      max-width: none;
      max-height: none;
    }

    .center-card .card-inner {
      transition: transform 1s ease;
    }

    .logo-crop {
      width: clamp(80px, 18vh, 150px);
      height: clamp(80px, 18vh, 150px);
      margin: 0 auto clamp(10px, 2vh, 25px) auto;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #b8860b;
      box-shadow: 0 0 25px rgba(184, 134, 11, 0.4);
      background: #fff;
      flex-shrink: 0;
    }

    .logo-img {
      width: 105%;
      height: 105%;
      object-fit: cover;
      margin-left: -2.5%;
      margin-top: -2.5%;
    }

    .title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1rem, 3.5vh, 1.5rem);
      color: #dfb76c;
      margin-bottom: clamp(6px, 1.5vh, 15px);
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      text-align: center;
    }

    .description {
      font-size: clamp(0.75rem, 2vh, 0.95rem);
      line-height: 1.5;
      color: #cdbfb2;
      margin-bottom: clamp(8px, 2vh, 20px);
      text-align: center;
    }

    .badge {
      display: inline-block;
      font-family: 'Metamorphous', serif;
      font-size: clamp(0.6rem, 1.5vh, 0.75rem);
      color: #ff4500;
      background: rgba(255, 69, 0, 0.1);
      border: 1px solid rgba(255, 69, 0, 0.3);
      padding: clamp(4px, 0.8vh, 6px) clamp(8px, 1.5vw, 14px);
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: clamp(10px, 3vh, 35px);
    }

    .bento-menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(6px, 1vh, 12px);
      margin-bottom: clamp(8px, 2vh, 25px);
      width: 100%;
    }

    .btn-yt {
      grid-column: span 2;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(4px, 1vh, 10px);
      padding: clamp(10px, 2vh, 15px) clamp(8px, 1.5vw, 12px);
      text-decoration: none;
      font-family: 'Metamorphous', serif;
      font-size: clamp(0.7rem, 1.8vh, 0.9rem);
      color: #f5efe6;
      background: #251414;
      border: 1px solid #4a2e2e;
      border-radius: 10px;
      transition: transform 0.2s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.4);
    }

    .btn:hover {
      transform: translateY(-2px);
      color: #fff;
    }

    .btn-insta:hover {
      background: linear-gradient(45deg, #f09433, #e1306c, #bc1888);
      border-color: #e1306c;
      box-shadow: 0 0 15px rgba(225, 48, 108, 0.4);
    }

    .btn-tiktok:hover {
      background: #010101;
      border-color: #00f2fe;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
    }

    .btn-yt:hover {
      background: #ff0000;
      border-color: #ff0000;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
    }

    .footer {
      font-size: clamp(0.6rem, 1.5vh, 0.75rem);
      color: #6e5d53;
      text-align: center;
    }
    .site-footer {
      position: fixed;
      z-index: 1;
      bottom: 4px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      pointer-events: none;
    }
    .site-footer .footer,
    .site-footer .version {
      pointer-events: auto;
    }
    .version {
      font-size: clamp(0.5rem, 1.2vh, 0.65rem);
      color: #6e5d53;
      opacity: 0.6;
      font-family: 'Courier New', monospace;
    }

    @media (max-width: 500px) {
      .grid {
        gap: 4px;
        padding: 4px;
        height: min(95vh, 500px);
      }
      .card {
        max-width: 120px;
        max-height: 210px;
      }
    }
  </style>
</head>
<body>
  <canvas id="embers-canvas"></canvas>
  <div class="grid" id="cardGrid"></div>
  <div class="site-footer">
    <footer class="footer">
      <span id="easterEgg">&copy;</span> 2026 Tous droits r&eacute;serv&eacute;s.
    </footer>
    <span class="version">v1.0.003</span>
  </div>

  <script>
    const outerContent = '<div class="outer-content"></div>';
    const centerContent = `
      <div class="center-content">
        <div class="logo-crop">
          <img src="PP_insta.png" alt="Donjons & Bastons" class="logo-img">
        </div>
        <h1 class="title">Donjons &amp; Bastons</h1>
        <p class="description">
          Un jeu de soci&eacute;t&eacute; inspir&eacute; du jeu de r&ocirc;le. Rejoignez l'aventure, seul ou en &eacute;quipe : lancez les d&eacute;s, combattez les monstres et tentez votre chance face aux dangers du Donjon !
        </p>
        <div class="badge">Jeu en cours de cr&eacute;ation</div>
        <nav class="bento-menu">
          <a href="https://www.instagram.com/donjonsetbastons?igsh=ZG05cDR3MmxvdWow" target="_blank" class="btn btn-insta">
            <i class="fa-brands fa-instagram"></i> Instagram
          </a>
          <a href="https://vm.tiktok.com/ZNRKCSmkf/" target="_blank" class="btn btn-tiktok">
            <i class="fa-brands fa-tiktok"></i> TikTok
          </a>
          <a href="https://youtube.com/@donjonsbastons?si=qlxiKCUOFmWNRY7P" target="_blank" class="btn btn-yt">
            <i class="fa-brands fa-youtube"></i> YouTube
          </a>
        </nav>
      </div>`;

    const grid = document.getElementById('cardGrid');

    for (let i = 0; i < 9; i++) {
      const isCenter = i === 4;
      const card = document.createElement('div');
      card.className = 'card' + (isCenter ? ' center-card' : '');
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-front">
            ${isCenter ? centerContent : outerContent}
          </div>
          <div class="card-back"></div>
        </div>`;
      grid.appendChild(card);
    }

    const centerCard = document.querySelectorAll('.card')[4];
    let placeholder = null;

    function toggleLogo(img) {
      img.src = img.src.includes('PP_insta2') ? 'PP_insta.png' : 'PP_insta2.png';
    }

    function openCard(card) {
      const targetW = Math.min(550, window.innerWidth * 0.92);
      const targetH = window.innerHeight * 0.88;

      const gridRect = grid.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();

      placeholder = document.createElement('div');
      placeholder.style.cssText = 'width:100%;height:100%;';
      grid.insertBefore(placeholder, card);

      card.style.position = 'absolute';
      card.style.left = (cardRect.left - gridRect.left) + 'px';
      card.style.top = (cardRect.top - gridRect.top) + 'px';
      card.style.width = cardRect.width + 'px';
      card.style.height = cardRect.height + 'px';
      card.style.maxWidth = 'none';
      card.style.maxHeight = 'none';
      card.style.margin = '0';
      card.style.zIndex = '999';

      void card.offsetWidth;

      card.style.transition = 'left 1s ease, top 1s ease, width 1s ease, height 1s ease';
      const finalLeft = (gridRect.width - targetW) / 2;
      const finalTop = (gridRect.height - targetH) / 2;
      card.style.left = finalLeft + 'px';
      card.style.top = finalTop + 'px';
      card.style.width = targetW + 'px';
      card.style.height = targetH + 'px';

      function onExpandEnd(e) {
        if (e.propertyName !== 'width' && e.propertyName !== 'height') return;
        card.removeEventListener('transitionend', onExpandEnd);

        card.style.transition = '';
        card.classList.add('flipped');
      }
      card.addEventListener('transitionend', onExpandEnd);
    }

    function closeCard(card) {
      card.classList.remove('flipped');

      var inner = card.querySelector('.card-inner');
      function onFlipEnd(e) {
        if (e.propertyName !== 'transform') return;
        inner.removeEventListener('transitionend', onFlipEnd);

        if (placeholder && placeholder.parentNode) {
          var gridRect = grid.getBoundingClientRect();
          var phRect = placeholder.getBoundingClientRect();

          card.style.transition = 'left 1s ease, top 1s ease, width 1s ease, height 1s ease';
          card.style.left = (phRect.left - gridRect.left) + 'px';
          card.style.top = (phRect.top - gridRect.top) + 'px';
          card.style.width = phRect.width + 'px';
          card.style.height = phRect.height + 'px';

          function onShrinkEnd(e2) {
            if (e2.propertyName !== 'width' && e2.propertyName !== 'height') return;
            card.removeEventListener('transitionend', onShrinkEnd);
            cleanupCard(card);
          }
          card.addEventListener('transitionend', onShrinkEnd);
        } else {
          cleanupCard(card);
        }
      }
      inner.addEventListener('transitionend', onFlipEnd);
    }

    function cleanupCard(card) {
      if (placeholder && placeholder.parentNode) {
        placeholder.parentNode.removeChild(placeholder);
      }
      placeholder = null;

      card.style.position = '';
      card.style.left = '';
      card.style.top = '';
      card.style.width = '';
      card.style.height = '';
      card.style.maxWidth = '';
      card.style.maxHeight = '';
      card.style.margin = '';
      card.style.zIndex = '';
      card.style.transition = '';
    }

    document.getElementById('easterEgg').addEventListener('click', function() {
      window.open('https://thekatow.github.io/donjonsetbastons/', '_blank');
    });

    grid.addEventListener('click', function(e) {
      const link = e.target.closest('a');
      if (link) return;

      const logo = e.target.closest('.logo-img');
      if (logo) {
        toggleLogo(logo);
        return;
      }

      const card = e.target.closest('.card');
      if (!card) return;

      if (card.classList.contains('center-card')) {
        if (card.classList.contains('flipped')) {
          closeCard(card);
        } else {
          openCard(card);
        }
      } else {
        card.classList.toggle('flipped');
      }
    });

    (function() {
      const canvas = document.getElementById('embers-canvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      let animationId = null;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      window.addEventListener('resize', resize);
      resize();

      const MAX_PARTICLES = 60;

      function createOrangeParticle() {
        return {
          type: 'orange',
          x: canvas.width + 5,
          y: Math.random() * canvas.height,
          vx: -(0.8 + Math.random() * 2.2),
          vy: (Math.random() - 0.5) * 0.5,
          size: 1.5 + Math.random() * 2.5,
          baseOpacity: 0.3 + Math.random() * 0.7,
          life: 0,
          maxLife: 100 + Math.random() * 140,
          drift: (Math.random() - 0.5) * 0.3,
          phase: Math.random() * Math.PI * 2,
        };
      }

      function createBlueParticle() {
        return {
          type: 'blue',
          x: -5,
          y: Math.random() * canvas.height,
          vx: 0.8 + Math.random() * 2.2,
          vy: (Math.random() - 0.5) * 0.5,
          size: 1.5 + Math.random() * 2.5,
          baseOpacity: 0.3 + Math.random() * 0.7,
          life: 0,
          maxLife: 100 + Math.random() * 140,
          drift: (Math.random() - 0.5) * 0.3,
          phase: Math.random() * Math.PI * 2,
        };
      }

      for (let i = 0; i < 15; i++) {
        const p = createOrangeParticle();
        p.life = Math.random() * p.maxLife;
        p.x = canvas.width - Math.random() * canvas.width * 0.4;
        particles.push(p);
      }

      for (let i = 0; i < 15; i++) {
        const p = createBlueParticle();
        p.life = Math.random() * p.maxLife;
        p.x = Math.random() * canvas.width * 0.4;
        particles.push(p);
      }

      function animate() {
        if (particles.length < MAX_PARTICLES) {
          if (Math.random() < 0.35) particles.push(createOrangeParticle());
          if (Math.random() < 0.35) particles.push(createBlueParticle());
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const fadeRight = canvas.width * 0.55;
        const fadeLeft = canvas.width * 0.45;

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.life++;

          if (p.life > p.maxLife) {
            particles.splice(i, 1);
            continue;
          }

          p.x += p.vx + Math.sin(p.life * 0.025 + p.phase) * p.drift;
          p.y += p.vy;

          let alpha = p.baseOpacity;

          if (p.type === 'orange') {
            if (p.x < fadeRight) {
              const t = Math.max(0, Math.min(1, (fadeRight - p.x) / (fadeRight - canvas.width * 0.45)));
              alpha *= 1 - t;
            }
            if (p.x < -20 || p.x > canvas.width + 20) { particles.splice(i, 1); continue; }
          } else {
            if (p.x > fadeLeft) {
              const t = Math.max(0, Math.min(1, (p.x - fadeLeft) / (canvas.width * 0.55 - fadeLeft)));
              alpha *= 1 - t;
            }
            if (p.x > canvas.width + 20 || p.x < -20) { particles.splice(i, 1); continue; }
          }

          if (alpha < 0.01) continue;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);

          if (p.type === 'orange') {
            ctx.fillStyle = `rgba(255, ${Math.floor(160 - p.size * 10)}, 50, ${alpha})`;
          } else {
            ctx.fillStyle = `rgba(50, 150, 255, ${alpha})`;
          }
          ctx.fill();

          if (p.size > 2.5) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
            if (p.type === 'orange') {
              ctx.fillStyle = `rgba(255, 160, 50, ${alpha * 0.1})`;
            } else {
              ctx.fillStyle = `rgba(50, 150, 255, ${alpha * 0.1})`;
            }
            ctx.fill();
          }
        }

        animationId = requestAnimationFrame(animate);
      }

      animate();
    })();
  </script>
</body>
</html>
