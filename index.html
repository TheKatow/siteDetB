<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donjons & Bastons</title>
    <link rel="icon" type="image/png" href="PP_insta2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Metamorphous&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
      overflow: clip;
    }

    body {
      height: 100%;
      overflow: hidden;
      background-color: #0d0707;
      background-image: radial-gradient(circle, #3a1313 0%, #0d0707 100%);
      color: #f5efe6;
      font-family: 'Open Sans', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .grid {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: clamp(6px, 1.2vh, 14px);
      width: 100%;
      max-width: 700px;
      max-height: 100%;
      height: min(95vh, 750px);
      padding: clamp(6px, 1vh, 14px);
      overflow: visible;
      justify-items: center;
      align-items: center;
    }

    .card {
      position: relative;
      perspective: 1000px;
      cursor: pointer;
      width: 100%;
      height: 100%;
      max-width: 200px;
      max-height: 340px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s ease;
      transform-style: preserve-3d;
      transform: rotateY(180deg);
      border: 2px solid #b8860b;
      border-radius: 14px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
    }

    .card.flipped .card-inner {
      transform: rotateY(0deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 12px;
    }

    .card-back {
      transform: rotateY(180deg);
      background: #0d0707;
      border-radius: 12px;
    }

    .card-back::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("card-back.png") center center / cover no-repeat;
      opacity: 0.35;
      border-radius: 12px;
    }

    .card-front {
      background: #0d0707;
      border-radius: 12px;
      overflow: hidden;
    }

    .card-front::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("fond_site.jpg") top center / cover no-repeat;
      opacity: 0.35;
      z-index: 0;
      border-radius: 12px;
    }

    .card-front > * {
      position: relative;
      z-index: 1;
    }

    .center-content {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vh, 40px) clamp(16px, 3vw, 30px);
      height: 100%;
      width: 100%;
    }

    .card.flipped .center-content {
      display: flex;
    }

    .outer-content {
      display: none;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .card:not(.center-card).flipped .outer-content {
      display: flex;
    }

    .center-card {
      position: relative;
      z-index: 1;
      transition: width 1s ease, height 1s ease;
    }

    .center-card.expanding {
      z-index: 999;
      max-width: none;
      max-height: none;
    }

    .center-card.expanding .card-front {
      overflow: hidden;
    }

    .center-card .card-inner {
      transition: transform 1s ease;
    }

    .logo-crop {
      width: clamp(80px, 18vh, 150px);
      height: clamp(80px, 18vh, 150px);
      margin: 0 auto clamp(10px, 2vh, 25px) auto;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #b8860b;
      box-shadow: 0 0 25px rgba(184, 134, 11, 0.4);
      background: #fff;
      flex-shrink: 0;
    }

    .logo-img {
      width: 105%;
      height: 105%;
      object-fit: cover;
      margin-left: -2.5%;
      margin-top: -2.5%;
    }

    .title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1rem, 3.5vh, 1.5rem);
      color: #dfb76c;
      margin-bottom: clamp(6px, 1.5vh, 15px);
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      text-align: center;
    }

    .description {
      font-size: clamp(0.75rem, 2vh, 0.95rem);
      line-height: 1.5;
      color: #cdbfb2;
      margin-bottom: clamp(8px, 2vh, 20px);
      text-align: center;
    }

    .badge {
      display: inline-block;
      font-family: 'Metamorphous', serif;
      font-size: clamp(0.6rem, 1.5vh, 0.75rem);
      color: #ff4500;
      background: rgba(255, 69, 0, 0.1);
      border: 1px solid rgba(255, 69, 0, 0.3);
      padding: clamp(4px, 0.8vh, 6px) clamp(8px, 1.5vw, 14px);
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: clamp(10px, 3vh, 35px);
    }

    .bento-menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(6px, 1vh, 12px);
      margin-bottom: clamp(8px, 2vh, 25px);
      width: 100%;
    }

    .btn-yt {
      grid-column: span 2;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(4px, 1vh, 10px);
      padding: clamp(10px, 2vh, 15px) clamp(8px, 1.5vw, 12px);
      text-decoration: none;
      font-family: 'Metamorphous', serif;
      font-size: clamp(0.7rem, 1.8vh, 0.9rem);
      color: #f5efe6;
      background: #251414;
      border: 1px solid #4a2e2e;
      border-radius: 10px;
      transition: transform 0.2s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.4);
    }

    .btn:hover {
      transform: translateY(-2px);
      color: #fff;
    }

    .btn-insta:hover {
      background: linear-gradient(45deg, #f09433, #e1306c, #bc1888);
      border-color: #e1306c;
      box-shadow: 0 0 15px rgba(225, 48, 108, 0.4);
    }

    .btn-tiktok:hover {
      background: #010101;
      border-color: #00f2fe;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
    }

    .btn-yt:hover {
      background: #ff0000;
      border-color: #ff0000;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
    }

    .footer {
      font-size: clamp(0.6rem, 1.5vh, 0.75rem);
      color: #6e5d53;
      text-align: center;
    }

    @media (max-width: 500px) {
      .grid {
        gap: 4px;
        padding: 4px;
        height: min(95vh, 500px);
      }
      .card {
        max-width: 120px;
        max-height: 210px;
      }
    }
  </style>
</head>
<body>
  <div class="grid" id="cardGrid"></div>

  <script>
    const outerContent = '<div class="outer-content"></div>';
    const centerContent = `
      <div class="center-content">
        <div class="logo-crop">
          <img src="PP_insta.png" alt="Donjons & Bastons" class="logo-img">
        </div>
        <h1 class="title">Donjons &amp; Bastons</h1>
        <p class="description">
          Un jeu de soci&eacute;t&eacute; inspir&eacute; du jeu de r&ocirc;le. Rejoignez l'aventure, seul ou en &eacute;quipe : lancez les d&eacute;s, combattez les monstres et tentez votre chance face aux dangers du Donjon !
        </p>
        <div class="badge">Jeu en cours de cr&eacute;ation</div>
        <nav class="bento-menu">
          <a href="https://www.instagram.com/donjonsetbastons?igsh=ZG05cDR3MmxvdWow" target="_blank" class="btn btn-insta">
            <i class="fa-brands fa-instagram"></i> Instagram
          </a>
          <a href="https://vm.tiktok.com/ZNRKCSmkf/" target="_blank" class="btn btn-tiktok">
            <i class="fa-brands fa-tiktok"></i> TikTok
          </a>
          <a href="https://youtube.com/@donjonsbastons?si=qlxiKCUOFmWNRY7P" target="_blank" class="btn btn-yt">
            <i class="fa-brands fa-youtube"></i> YouTube
          </a>
        </nav>
        <footer class="footer">
          <span id="easterEgg" style="cursor:default">&copy;</span> 2026 Tous droits r&eacute;serv&eacute;s.
        </footer>
      </div>`;

    const grid = document.getElementById('cardGrid');

    for (let i = 0; i < 9; i++) {
      const isCenter = i === 4;
      const card = document.createElement('div');
      card.className = 'card' + (isCenter ? ' center-card' : '');
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-front">
            ${isCenter ? centerContent : outerContent}
          </div>
          <div class="card-back"></div>
        </div>`;
      grid.appendChild(card);
    }

    const centerCard = document.querySelectorAll('.card')[4];
    let placeholder = null;

    function toggleLogo(img) {
      img.src = img.src.includes('PP_insta2') ? 'PP_insta.png' : 'PP_insta2.png';
    }

    let expandHandler = null;

    function expandCard(card) {
      const targetW = Math.min(550, window.innerWidth * 0.92);
      const targetH = window.innerHeight * 0.88;

      card.style.maxWidth = 'none';
      card.style.maxHeight = 'none';
      card.style.width = targetW + 'px';
      card.style.height = targetH + 'px';
      card.classList.add('expanding');
    }

    function openCard(card) {
      card.classList.add('flipped');

      const inner = card.querySelector('.card-inner');
      expandHandler = function(e) {
        if (e.propertyName === 'transform') {
          inner.removeEventListener('transitionend', expandHandler);
          expandHandler = null;
          expandCard(card);
        }
      };
      inner.addEventListener('transitionend', expandHandler);
    }

    function closeCard(card) {
      if (expandHandler) {
        const inner = card.querySelector('.card-inner');
        inner.removeEventListener('transitionend', expandHandler);
        expandHandler = null;
      }

      card.classList.remove('expanding');
      card.style.width = '';
      card.style.height = '';
      card.style.maxWidth = '';
      card.style.maxHeight = '';

      setTimeout(function() {
        card.classList.remove('flipped');
      }, 1000);
    }

    grid.addEventListener('click', function(e) {
      const link = e.target.closest('a');
      if (link) return;

      if (e.target.id === 'easterEgg') {
        window.open('https://thekatow.github.io/donjonsetbastons/', '_blank');
        return;
      }

      const logo = e.target.closest('.logo-img');
      if (logo) {
        toggleLogo(logo);
        return;
      }

      const card = e.target.closest('.card');
      if (!card) return;

      if (card.classList.contains('center-card')) {
        if (card.classList.contains('flipped')) {
          closeCard(card);
        } else {
          openCard(card);
        }
      } else {
        card.classList.toggle('flipped');
      }
    });
  </script>
</body>
</html>
