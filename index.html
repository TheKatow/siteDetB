<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Donjons & Bastons | Le Jeu de Cartes d'Exploration de Donjons</title>

    <meta name="description" content="Découvrez Donjons & Bastons, un jeu de cartes tactique d'exploration de donjons. Suivez notre aventure sur les réseaux et préparez-vous pour le crowdfunding !">

    <meta property="og:title" content="Donjons & Bastons | Jeu de Cartes">
    <meta property="og:description" content="Explorez le donjon, combattez les monstres. Suivez le projet !">
    <meta property="og:image" content="https://donjonsetbastons.fr/visuel-partage.jpg">
    <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f0f0f url("banniere.jpg") center center / cover no-repeat;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .description {
      text-align: center;
      font-family: 'Caveat', cursive;
      font-size: 1.6rem;
      font-weight: 600;
      line-height: 1.5;
      max-width: 1000px;
      margin-bottom: 1.5rem;
      padding: 0 1rem;
    }

    /* ===== MÈCHE ===== */
    .fuse-wrapper {
      position: relative;
      z-index: 0;
      width: 100vw;
      height: 56px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 28px;
      background: url("corde.png") center center / cover no-repeat;
    }

    .fuse-burned {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      border-radius: 28px 0 0 28px;
      background: url("corde_brulée.png") center center / cover no-repeat;
      transition: width 1s linear;
      z-index: 1;
    }

    .mage-container {
      position: absolute;
      left: 0;
      bottom: 100%;
      transform: translate(-50%, 4px);
      z-index: 2;
      transition: left 1s linear;
      pointer-events: none;
    }

    .mage-container img {
      width: 56px;
      height: 56px;
      display: block;
    }

    /* ===== BOUTONS ===== */
    .button-group {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 4rem;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: #fff;
      color: #0f0f0f;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 8px;
      transition: opacity 0.25s ease, transform 0.25s ease;
      letter-spacing: 0.02em;
    }

    .btn:hover {
      opacity: 0.75;
      transform: scale(1.04);
    }

    .footer {
      text-align: center;
      font-size: 0.875rem;
      color: #999;
      padding-bottom: 0.5rem;
    }

    .copyright {
      display: inline-block;
      cursor: default;
      user-select: none;
    }

    .toast {
      position: fixed;
      bottom: 4rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(10,10,30,0.95);
      border: 1px solid rgba(245,200,66,0.25);
      border-radius: 10px;
      padding: 0.65rem 1.25rem;
      color: #f0d080;
      font-size: 0.85rem;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s ease;
      z-index: 10;
      backdrop-filter: blur(8px);
    }

    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 640px) {
      .description { font-size: 1.2rem; padding: 0 0.5rem; }
      .fuse-wrapper { height: 30px; }
      .mage-container img { width: 42px; height: 42px; }
      .btn { padding: 0.6rem 1.2rem; font-size: 0.85rem; }
      .container { padding: 0 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">

    <p class="description">
      Donjons &amp; Bastons est un jeu de soci&eacute;t&eacute; inspir&eacute; du jeu de r&ocirc;le.<br>
      Rejoignez l'aventure, seul ou en &eacute;quipe : Lancez les d&eacute;s, combattez les monstres et tentez votre chance face aux dangers du Donjon, seul ou en &eacute;quipe !<br>
      Jeu en cours de cr&eacute;ation !
    </p>

    <div class="fuse-wrapper">
      <div class="fuse-burned" id="fuseBurned"></div>
      <div class="mage-container" id="mageContainer">
        <img src="mage_bleu.gif" alt="Mage">
      </div>
    </div>

    <div class="button-group">
      <a href="https://www.instagram.com/donjonsetbastons?igsh=ZG05cDR3MmxvdWow" target="_blank" rel="noopener noreferrer" class="btn">Instagram</a>
      <a href="https://vm.tiktok.com/ZNRTfNsvg/" target="_blank" rel="noopener noreferrer" class="btn">TikTok</a>
      <a href="https://youtube.com/@donjonsbastons?si=_zsOGzjxVTvHwoIV" target="_blank" rel="noopener noreferrer" class="btn">YouTube</a>
    </div>

    <div class="footer">
      <span class="copyright" id="copyright">&copy;</span>
      <span> 2026 Tous droits r&eacute;serv&eacute;s.</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (function() {
      'use strict';
      // start: 2026-04-08, end: 2026-10-01
      var _start = "MjAyNi0wNC0wOFQwMDowMDowMA==";
      var _end   = "MjAyNi0xMC0wMVQyMzo1OTo1OQ==";
      var _egg   = "aHR0cHM6Ly90aGVrYXRvdy5naXRodWIuaW8vZG9uam9uc2V0YmFzdG9ucw==";

      var START_DATE = new Date(atob(_start));
      var END_DATE   = new Date(atob(_end));
      var EGG_URL    = atob(_egg);

      var fuseBurned  = document.getElementById('fuseBurned');
      var mageContainer = document.getElementById('mageContainer');
      var toast       = document.getElementById('toast');

      function update() {
        var now = new Date();
        var total = END_DATE.getTime() - START_DATE.getTime();
        var elapsed = now.getTime() - START_DATE.getTime();
        var percent = Math.min(Math.max(elapsed / total, 0), 1);
        var pct = percent * 100;
        fuseBurned.style.width = pct + '%';
        mageContainer.style.left = pct + '%';
      }

      update();
      setInterval(update, 1000);

      document.getElementById('copyright').addEventListener('dblclick', function(e) {
        e.preventDefault();
        toast.textContent = '\uD83D\uDD2E Un monde secret s\'ouvre\u2026';
        toast.classList.add('visible');
        clearTimeout(toast._hide);
        toast._hide = setTimeout(function() { toast.classList.remove('visible'); }, 3000);
        setTimeout(function() { window.open(EGG_URL, '_blank'); }, 1200);
      });
    })();
  </script>
</body>
</html>
