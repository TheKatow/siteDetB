<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Donjons & Bastons | Le Jeu de Cartes d'Exploration de Donjons</title>

    <meta name="description" content="Découvrez Donjons & Bastons, un jeu de cartes tactique d'exploration de donjons. Suivez notre aventure sur les réseaux et préparez-vous pour le crowdfunding !">

    <meta property="og:title" content="Donjons & Bastons | Jeu de Cartes">
    <meta property="og:description" content="Explorez le donjon, combattez les monstres. Suivez le projet !">
    <meta property="og:image" content="https://donjonsetbastons.fr/visuel-partage.jpg">
    <meta property="og:type" content="website">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f url("banniere.jpg") center center / cover no-repeat;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      padding: 2rem;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 720px;
      min-height: 80vh;
      position: relative;
      z-index: 1;
    }

    .button-group {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: auto;
      margin-bottom: 4rem;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: #fff;
      color: #0f0f0f;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 8px;
      transition: opacity 0.25s ease, transform 0.25s ease;
      letter-spacing: 0.02em;
    }

    .btn:hover {
      opacity: 0.75;
      transform: scale(1.04);
    }

    .footer {
      text-align: center;
      font-size: 0.875rem;
      color: #999;
      padding-bottom: 0.5rem;
    }

    .copyright {
      cursor: default;
      user-select: none;
    }

    .secret-btn {
      display: none;
      margin-top: 0.75rem;
      padding: 0.5rem 1.25rem;
      background: transparent;
      border: 1px solid #555;
      color: #aaa;
      font-size: 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .secret-btn:hover {
      border-color: #aaa;
      color: #fff;
    }

    .secret-btn.visible {
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="button-group">
      <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="btn">Instagram</a>
      <a href="https://tiktok.com" target="_blank" rel="noopener noreferrer" class="btn">TikTok</a>
      <a href="https://youtube.com" target="_blank" rel="noopener noreferrer" class="btn">YouTube</a>
    </div>

    <div class="footer">
      <span class="copyright" id="copyright">&copy;</span>
      <span> 2026 Tous droits r&eacute;serv&eacute;s.</span>
      <br>
      <button class="secret-btn" id="secretBtn">Application</button>
    </div>
  </div>

  <script>
    (function() {
      var copyright = document.getElementById('copyright');
      var secretBtn = document.getElementById('secretBtn');

      copyright.addEventListener('dblclick', function() {
        secretBtn.classList.toggle('visible');
      });

      secretBtn.addEventListener('click', function() {
        window.open('https://thekatow.github.io/donjonsetbastons/', '_blank');
      });
    })();
  </script>
</body>
</html>
