<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donjons & Bastons</title>
    <link rel="icon" type="image/png" href="PP_insta2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Metamorphous&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #0d0707;
      background-image: radial-gradient(circle, #3a1313 0%, #0d0707 100%);
      color: #f5efe6;
      font-family: 'Open Sans', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: clamp(6px, 1.2vh, 14px);
      width: 100%;
      max-width: 700px;
      max-height: 100%;
      height: min(90vh, 700px);
      padding: clamp(6px, 1vh, 14px);
      overflow: visible;
      justify-items: center;
      align-items: center;
    }

    .card {
      perspective: 1000px;
      cursor: pointer;
      width: 100%;
      height: 100%;
      max-width: 200px;
      max-height: 280px;
      transition: transform 0.4s ease;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s ease;
      transform-style: preserve-3d;
      transform: rotateY(180deg);
      border: 2px solid #b8860b;
      border-radius: 14px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
    }

    .card.flipped .card-inner {
      transform: rotateY(0deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 12px;
    }

    .card-back {
      transform: rotateY(180deg);
      background: #0d0707;
      border-radius: 12px;
    }

    .card-back::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("card-back.png") center center / cover no-repeat;
      opacity: 0.35;
      border-radius: 12px;
    }

    .card-front {
      background: #0d0707;
      border-radius: 12px;
      overflow-y: auto;
    }

    .card-front::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("fond_site.jpg") center center / cover no-repeat;
      opacity: 0.35;
      z-index: 0;
      border-radius: 12px;
    }

    .card-front > * {
      position: relative;
      z-index: 1;
    }

    .empty-front {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .center-card {
      z-index: 1;
    }

    .center-content {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(8px, 1.5vh, 20px);
      height: 100%;
    }

    .card.flipped .center-content {
      display: flex;
    }

    .outer-content {
      display: none;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .card:not(.center-card).flipped .outer-content {
      display: flex;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      padding: 20px;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .overlay-card {
      position: relative;
      width: min(92vw, 560px);
      max-height: 90vh;
      border: 2px solid #b8860b;
      border-radius: 24px;
      background: #0d0707;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(184, 134, 11, 0.1);
      padding: clamp(24px, 4vh, 50px) clamp(20px, 3vw, 40px);
      text-align: center;
      overflow-y: auto;
      perspective: 1200px;
    }

    @keyframes flipOut {
      0% { transform: rotateY(0deg); opacity: 1; }
      100% { transform: rotateY(180deg); opacity: 0; }
    }

    .overlay-card.flipping {
      animation: flipOut 2s ease forwards;
    }

    .overlay-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("fond_site.jpg") top center / cover no-repeat;
      opacity: 0.35;
      z-index: 0;
      border-radius: 22px;
    }

    .overlay-card > * {
      position: relative;
      z-index: 1;
    }

    .overlay-card .logo-crop {
      width: clamp(80px, 16vh, 160px);
      height: clamp(80px, 16vh, 160px);
      margin-bottom: clamp(10px, 2vh, 25px);
    }

    .overlay-card .title {
      font-size: clamp(1.2rem, 4vh, 2.2rem);
      margin-bottom: clamp(8px, 1.5vh, 18px);
    }

    .overlay-card .description {
      font-size: clamp(0.8rem, 2.2vh, 1.1rem);
      line-height: 1.5;
      margin-bottom: clamp(8px, 1.5vh, 18px);
    }

    .overlay-card .badge {
      font-size: clamp(0.6rem, 1.5vh, 0.85rem);
      margin-bottom: clamp(12px, 3vh, 30px);
    }

    .overlay-card .bento-menu {
      gap: clamp(6px, 1vh, 14px);
      margin-bottom: clamp(10px, 2vh, 25px);
    }

    .overlay-card .btn {
      gap: clamp(6px, 1vh, 12px);
      padding: clamp(12px, 2.5vh, 20px) clamp(10px, 1.5vw, 16px);
      font-size: clamp(0.8rem, 2vh, 1.1rem);
      border-radius: 12px;
    }

    .overlay-card .footer {
      font-size: clamp(0.6rem, 1.2vh, 0.8rem);
    }

    .logo-crop {
      width: clamp(40px, 8vh, 90px);
      height: clamp(40px, 8vh, 90px);
      margin: 0 auto clamp(4px, 0.6vh, 10px) auto;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #b8860b;
      box-shadow: 0 0 20px rgba(184, 134, 11, 0.3);
      background: #fff;
      flex-shrink: 0;
    }

    .logo-img {
      width: 105%;
      height: 105%;
      object-fit: cover;
      margin-left: -2.5%;
      margin-top: -2.5%;
    }

    .title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(0.65rem, 2.2vh, 1.1rem);
      color: #dfb76c;
      margin-bottom: clamp(3px, 0.6vh, 8px);
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      text-align: center;
    }

    .description {
      font-size: clamp(0.45rem, 1.3vh, 0.7rem);
      line-height: 1.35;
      color: #cdbfb2;
      margin-bottom: clamp(3px, 0.6vh, 8px);
      text-align: center;
    }

    .badge {
      display: inline-block;
      font-family: 'Metamorphous', serif;
      font-size: clamp(0.35rem, 0.9vh, 0.55rem);
      color: #ff4500;
      background: rgba(255, 69, 0, 0.1);
      border: 1px solid rgba(255, 69, 0, 0.3);
      padding: clamp(2px, 0.4vh, 4px) clamp(4px, 0.8vw, 10px);
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: clamp(4px, 1vh, 14px);
    }

    .bento-menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(3px, 0.5vh, 7px);
      margin-bottom: clamp(3px, 0.6vh, 10px);
      width: 100%;
    }

    .btn-yt {
      grid-column: span 2;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(2px, 0.4vh, 6px);
      padding: clamp(4px, 0.8vh, 10px) clamp(3px, 0.6vw, 8px);
      text-decoration: none;
      font-family: 'Metamorphous', serif;
      font-size: clamp(0.4rem, 1.1vh, 0.65rem);
      color: #f5efe6;
      background: #251414;
      border: 1px solid #4a2e2e;
      border-radius: 7px;
      transition: transform 0.2s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 3px 5px rgba(0,0,0,0.4);
    }

    .btn:hover {
      transform: translateY(-1px);
      color: #fff;
    }

    .btn-insta:hover {
      background: linear-gradient(45deg, #f09433, #e1306c, #bc1888);
      border-color: #e1306c;
      box-shadow: 0 0 12px rgba(225, 48, 108, 0.4);
    }

    .btn-tiktok:hover {
      background: #010101;
      border-color: #00f2fe;
      box-shadow: 0 0 12px rgba(0, 242, 254, 0.4);
    }

    .btn-yt:hover {
      background: #ff0000;
      border-color: #ff0000;
      box-shadow: 0 0 12px rgba(255, 0, 0, 0.4);
    }

    .footer {
      font-size: clamp(0.35rem, 0.8vh, 0.55rem);
      color: #6e5d53;
      text-align: center;
    }

    @media (max-width: 500px) {
      .grid {
        gap: 4px;
        padding: 4px;
        height: min(95vh, 500px);
      }
      .card {
        max-width: 120px;
        max-height: 170px;
      }
      .overlay-card {
        padding: clamp(16px, 3vh, 30px) clamp(14px, 2vw, 24px);
        width: min(96vw, 500px);
      }
    }
  </style>
</head>
<body>
  <div class="grid" id="cardGrid"></div>

  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <div class="logo-crop">
        <img src="PP_insta.png" alt="Donjons & Bastons" class="logo-img" id="overlayLogo">
      </div>
      <h1 class="title">Donjons &amp; Bastons</h1>
      <p class="description">
        Un jeu de soci&eacute;t&eacute; inspir&eacute; du jeu de r&ocirc;le. Rejoignez l'aventure, seul ou en &eacute;quipe : lancez les d&eacute;s, combattez les monstres et tentez votre chance face aux dangers du Donjon !
      </p>
      <div class="badge">Jeu en cours de cr&eacute;ation</div>
      <nav class="bento-menu">
        <a href="https://www.instagram.com/donjonsetbastons?igsh=ZG05cDR3MmxvdWow" target="_blank" class="btn btn-insta">
          <i class="fa-brands fa-instagram"></i> Instagram
        </a>
        <a href="https://vm.tiktok.com/ZNRKCSmkf/" target="_blank" class="btn btn-tiktok">
          <i class="fa-brands fa-tiktok"></i> TikTok
        </a>
        <a href="https://youtube.com/@donjonsbastons?si=qlxiKCUOFmWNRY7P" target="_blank" class="btn btn-yt">
          <i class="fa-brands fa-youtube"></i> YouTube
        </a>
      </nav>
      <footer class="footer">
        <span id="overlayEasterEgg" style="cursor:default">&copy;</span> 2026 Tous droits r&eacute;serv&eacute;s.
      </footer>
    </div>
  </div>

  <script>
    const outerContent = '<div class="outer-content"></div>';
    const centerContent = `
      <div class="center-content">
        <div class="logo-crop">
          <img src="PP_insta.png" alt="Donjons & Bastons" class="logo-img">
        </div>
        <h1 class="title">Donjons &amp; Bastons</h1>
        <p class="description">
          Un jeu de soci&eacute;t&eacute; inspir&eacute; du jeu de r&ocirc;le. Rejoignez l'aventure, seul ou en &eacute;quipe : lancez les d&eacute;s, combattez les monstres et tentez votre chance face aux dangers du Donjon !
        </p>
        <div class="badge">Jeu en cours de cr&eacute;ation</div>
        <nav class="bento-menu">
          <a href="https://www.instagram.com/donjonsetbastons?igsh=ZG05cDR3MmxvdWow" target="_blank" class="btn btn-insta">
            <i class="fa-brands fa-instagram"></i> Instagram
          </a>
          <a href="https://vm.tiktok.com/ZNRKCSmkf/" target="_blank" class="btn btn-tiktok">
            <i class="fa-brands fa-tiktok"></i> TikTok
          </a>
          <a href="https://youtube.com/@donjonsbastons?si=qlxiKCUOFmWNRY7P" target="_blank" class="btn btn-yt">
            <i class="fa-brands fa-youtube"></i> YouTube
          </a>
        </nav>
        <footer class="footer">
          <span id="easterEgg" style="cursor:default">&copy;</span> 2026 Tous droits r&eacute;serv&eacute;s.
        </footer>
      </div>`;

    const grid = document.getElementById('cardGrid');

    for (let i = 0; i < 9; i++) {
      const isCenter = i === 4;
      const card = document.createElement('div');
      card.className = 'card' + (isCenter ? ' center-card' : '');
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-front">
            ${isCenter ? centerContent : outerContent}
          </div>
          <div class="card-back"></div>
        </div>`;
      grid.appendChild(card);
    }

    const overlay = document.getElementById('overlay');
    const centerCard = document.querySelectorAll('.card')[4];

    function toggleLogo(img) {
      img.src = img.src.includes('PP_insta2') ? 'PP_insta.png' : 'PP_insta2.png';
    }

    grid.addEventListener('click', function(e) {
      const link = e.target.closest('a');
      if (link) return;

      if (e.target.id === 'easterEgg') {
        window.open('https://thekatow.github.io/donjonsetbastons/', '_blank');
        return;
      }

      const logo = e.target.closest('.logo-img');
      if (logo) {
        toggleLogo(logo);
        return;
      }

      const card = e.target.closest('.card');
      if (!card) return;

      if (card.classList.contains('center-card')) {
        card.classList.toggle('flipped');
        overlay.classList.toggle('active');
      } else {
        card.classList.toggle('flipped');
      }
    });

    let isClosing = false;

    function closeOverlay() {
      if (isClosing) return;
      isClosing = true;
      const overlayCard = document.querySelector('.overlay-card');
      overlayCard.classList.add('flipping');
      centerCard.style.transition = 'transform 2s ease';
      centerCard.classList.remove('flipped');
      setTimeout(function() {
        overlay.classList.remove('active');
        overlayCard.classList.remove('flipping');
        centerCard.style.transition = '';
        isClosing = false;
      }, 2000);
    }

    overlay.addEventListener('click', function(e) {
      if (e.target === this) {
        closeOverlay();
        return;
      }
      if (e.target.closest('.overlay-card') && !e.target.closest('.logo-crop, .description, a')) {
        closeOverlay();
      }
    });

    const overlayLogo = document.getElementById('overlayLogo');
    if (overlayLogo) {
      overlayLogo.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleLogo(this);
      });
    }

    const overlayEasterEgg = document.getElementById('overlayEasterEgg');
    if (overlayEasterEgg) {
      overlayEasterEgg.addEventListener('click', function(e) {
        e.stopPropagation();
        window.open('https://thekatow.github.io/donjonsetbastons/', '_blank');
      });
    }
  </script>
</body>
</html>
