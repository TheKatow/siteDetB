<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donjons & Bastons</title>
    <link rel="icon" type="image/png" href="PP_insta2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Metamorphous&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #0d0707;
      background-image: radial-gradient(circle, #3a1313 0%, #0d0707 100%);
      color: #f5efe6;
      font-family: 'Open Sans', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .main-card {
      position: relative;
      max-width: 450px;
      max-height: 100%;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s ease;
      transform-style: preserve-3d;
      perspective: 1000px;
      border: 2px solid #b8860b;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(184, 134, 11, 0.15);
    }

    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      backface-visibility: hidden;
    }

    .card-front {
      position: relative;
      z-index: 2;
      padding: clamp(16px, 4vh, 40px) clamp(16px, 3vw, 30px);
      border-radius: 18px;
    }

    .card-front::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("fond_site.jpg") center center / cover no-repeat;
      opacity: 0.35;
      z-index: 0;
      border-radius: 18px;
    }

    .card-front > * {
      position: relative;
      z-index: 1;
    }

    .card-back {
      position: absolute;
      inset: 0;
      transform: rotateY(180deg);
      z-index: 1;
      background: #0d0707;
      border-radius: 18px;
    }

    .card-back::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("card-back.png") center center / cover no-repeat;
      opacity: 0.35;
      border-radius: 18px;
    }

    .logo-crop {
      width: clamp(80px, 18vh, 150px);
      height: clamp(80px, 18vh, 150px);
      margin: 0 auto clamp(10px, 2vh, 25px) auto;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #b8860b;
      box-shadow: 0 0 25px rgba(184, 134, 11, 0.4);
      background: #fff;
    }

    .logo-img {
      width: 105%;
      height: 105%;
      object-fit: cover;
      margin-left: -2.5%;
      margin-top: -2.5%;
    }

    .title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1rem, 3.5vh, 1.5rem);
      color: #dfb76c;
      margin-bottom: clamp(6px, 1.5vh, 15px);
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    .description {
      font-size: clamp(0.75rem, 2vh, 0.95rem);
      line-height: 1.5;
      color: #cdbfb2;
      margin-bottom: clamp(8px, 2vh, 20px);
    }

    .badge {
      display: inline-block;
      font-family: 'Metamorphous', serif;
      font-size: clamp(0.6rem, 1.5vh, 0.75rem);
      color: #ff4500;
      background: rgba(255, 69, 0, 0.1);
      border: 1px solid rgba(255, 69, 0, 0.3);
      padding: clamp(4px, 0.8vh, 6px) clamp(8px, 1.5vw, 14px);
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: clamp(10px, 3vh, 35px);
    }

    .bento-menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(6px, 1vh, 12px);
      margin-bottom: clamp(8px, 2vh, 25px);
    }

    .btn-yt {
      grid-column: span 2;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(4px, 1vh, 10px);
      padding: clamp(10px, 2vh, 15px) clamp(8px, 1.5vw, 12px);
      text-decoration: none;
      font-family: 'Metamorphous', serif;
      font-size: clamp(0.7rem, 1.8vh, 0.9rem);
      color: #f5efe6;
      background: #251414;
      border: 1px solid #4a2e2e;
      border-radius: 10px;
      transition: transform 0.2s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.4);
    }

    .btn:hover {
      transform: translateY(-2px);
      color: #fff;
    }

    .btn-insta:hover {
      background: linear-gradient(45deg, #f09433, #e1306c, #bc1888);
      border-color: #e1306c;
      box-shadow: 0 0 15px rgba(225, 48, 108, 0.4);
    }

    .btn-tiktok:hover {
      background: #010101;
      border-color: #00f2fe;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
    }

    .btn-yt:hover {
      background: #ff0000;
      border-color: #ff0000;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
    }

    .footer {
      font-size: clamp(0.6rem, 1.5vh, 0.75rem);
      color: #6e5d53;
    }
  </style>
</head>
<body>
  <div class="main-card">
    <div class="card-inner" id="cardInner">
      <div class="card-front">
        <div class="logo-crop">
          <img src="PP_insta.png" alt="Donjons & Bastons" class="logo-img">
        </div>

        <section class="content">
          <h1 class="title">Donjons & Bastons</h1>
          <p class="description">
            Un jeu de société inspiré du jeu de rôle. Rejoignez l'aventure, seul ou en équipe : lancez les dés, combattez les monstres et tentez votre chance face aux dangers du Donjon !
          </p>
          <div class="badge">Jeu en cours de création</div>
        </section>

        <nav class="bento-menu">
          <a href="https://www.instagram.com/donjonsetbastons?igsh=ZG05cDR3MmxvdWow" target="_blank" class="btn btn-insta">
            <i class="fa-brands fa-instagram"></i> Instagram
          </a>
          <a href="https://vm.tiktok.com/ZNRKCSmkf/" target="_blank" class="btn btn-tiktok">
            <i class="fa-brands fa-tiktok"></i> TikTok
          </a>
          <a href="https://youtube.com/@donjonsbastons?si=qlxiKCUOFmWNRY7P" target="_blank" class="btn btn-yt">
            <i class="fa-brands fa-youtube"></i> YouTube
          </a>
        </nav>

        <footer class="footer">
          &copy; 2026 Tous droits r&eacute;serv&eacute;s.
        </footer>
      </div>

      <div class="card-back"></div>
    </div>
  </div>

  <script>
    const cardInner = document.getElementById('cardInner');
    const logo = document.querySelector('.logo-img');

    cardInner.addEventListener('click', function(e) {
      if (e.target.closest('.logo-crop, .content, .bento-menu, .footer')) return;
      this.classList.toggle('flipped');
    });

    logo.addEventListener('click', function(e) {
      e.stopPropagation();
      this.src = this.src.includes('PP_insta2') ? 'PP_insta.png' : 'PP_insta2.png';
    });
  </script>
</body>
</html>
